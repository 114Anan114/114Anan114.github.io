<html>
    <body>
        <div>
            <br/>
            <br/>
            <br/>
            <br/>
            <br/>
            <br/>
            <h1>I've already chosen. But this woman must also choose me. Be my girlfriend?</h1>
            <img id="valentineImage" src="https://i.guim.co.uk/img/static/sys-images/Film/Pix/pictures/2009/8/25/1251188740019/Avatar-Blue-Kisses-001.jpg?width=465&dpr=1&s=none&crop=none" alt="Valentine's Day Image" style="max-width: 300px; height: auto;">
            <br/>
            <br/>
            <br/>
            <button id="yesButton">Yes!</button>
            <button id="no">bro no bro</button>
        </div>

        <style>
            body {
                background: linear-gradient(to bottom, #6d86f7, #2836fa);
            }
            div {
                text-align: center;
                vertical-align: middle;
            }
            h1 {
                color: #ff477e;
            }
            #yesButton {
                background-color: #06d6a0;
                transition: transform 0.3s;
                margin-right: 10px;
                width: 120px;
                font-size: 30px;
                height: 40px;
                color: #fff;
                margin-left: -140px;
            }
            #no {
                position: absolute;
                background-color: #ef476f;
                transition: transform 0.3s;
                margin-left: 10px;
                width: 120px;
                /* font-size: 30px; */
                height: 40px;
                color: #fff;
            }
        </style>
        <script>
            document.getElementById("yesButton").addEventListener("click", showAlert);

            function showAlert() {
                alert("I love you I love you I love you! Hope I did well enough for you?");
            }

            var yesButton = document.getElementById("yesButton");
            var no = document.getElementById("no");
            var valentineImage = document.getElementById("valentineImage");

            var noTexts = ["Are we forreal olivia", "I will treat you SOOO right", "Neytiri didn't do this shit", "you don't love me?", "evil woman alert", "so you hate me"];
            var imageSources = ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTv4792I_-c8yQ_u0NBmgrBbXWEfAcFJp4svQ&s", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTz3WrzihGNhkIZk4Pz4TSpwzGJWkVAn3gv4A&s", "https://cdn.displate.com/artwork/857x1200/2023-09-19/d8bfbbe80f847348b141a6eeaf324ce8_919faa071c873cee9fffcb679ae234f3.jpg", "https://i.pinimg.com/236x/6b/fd/d3/6bfdd3689fc3532ac0992d2e88cb5ef5.jpg"];

            no.addEventListener("click", change);

            function change() {
                var randomIndex = Math.floor(Math.random() * noTexts.length);
                var randomText = noTexts[randomIndex];
                no.innerText = randomText;

                var i = Math.floor(Math.random() * 1000) + 1;
                var j = Math.floor(Math.random() * 700) + 1;
                no.style.left = i + "px";
                no.style.top = j + "px";

                var currentWidth = yesButton.offsetWidth;
                var currentHeight = yesButton.offsetHeight
                yesButton.style.width = currentWidth + 30 + "px";
                yesButton.style.height = currentHeight + 10 + "px";

                var randomImageIndex = Math.floor(Math.random() * imageSources.length);
                valentineImage.src = imageSources[randomImageIndex];
            }
        </script>
    </body>
</html>
